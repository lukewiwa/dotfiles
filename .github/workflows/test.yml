name: Test dotfiles install

on:
  push:
  pull_request:

jobs:
  # Simulates a VS Code dev container (REMOTE_CONTAINERS=true)
  # Expected: base tools only, no ffmpeg
  test-devcontainer:
    name: Dev container (Linux)
    runs-on: ubuntu-latest
    env:
      REMOTE_CONTAINERS: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Run install
        run: bash ./install.sh

      - name: Assert base tools installed
        run: |
          export PATH="${HOME}/.local/bin:${PATH}"
          eval "$(~/.local/bin/mise activate bash)"
          for tool in bat delta fzf glow jq just lazydocker lazygit nvim; do
            if ! command -v "$tool" &>/dev/null; then
              echo "FAIL: $tool not found"
              exit 1
            fi
            echo "OK: $tool"
          done

      - name: Assert ffmpeg not installed
        run: |
          export PATH="${HOME}/.local/bin:${PATH}"
          eval "$(~/.local/bin/mise activate bash)"
          if command -v ffmpeg &>/dev/null; then
            echo "FAIL: ffmpeg should not be installed in dev container"
            exit 1
          fi
          echo "OK: ffmpeg absent"

      - name: Assert MISE_ENV not set to work
        run: |
          source ~/.zshrc 2>/dev/null || true
          if [ "${MISE_ENV:-}" = "work" ]; then
            echo "FAIL: MISE_ENV should not be 'work' in a dev container"
            exit 1
          fi
          echo "OK: MISE_ENV=${MISE_ENV:-<unset>}"

  # Simulates a work Linux machine (no REMOTE_CONTAINERS)
  # Expected: base tools + ffmpeg
  test-work-linux:
    name: Work machine (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run install
        run: bash ./install.sh

      - name: Assert base tools installed
        run: |
          export PATH="${HOME}/.local/bin:${PATH}"
          eval "$(~/.local/bin/mise activate bash)"
          for tool in bat delta fzf glow jq just lazydocker lazygit nvim; do
            if ! command -v "$tool" &>/dev/null; then
              echo "FAIL: $tool not found"
              exit 1
            fi
            echo "OK: $tool"
          done

      - name: Assert ffmpeg installed
        run: |
          export PATH="${HOME}/.local/bin:${PATH}"
          eval "$(~/.local/bin/mise activate bash)"
          if ! command -v ffmpeg &>/dev/null; then
            echo "FAIL: ffmpeg should be installed on work machine"
            exit 1
          fi
          echo "OK: ffmpeg $(ffmpeg -version 2>&1 | head -1)"

  # Simulates a work macOS machine (no REMOTE_CONTAINERS)
  # Expected: base tools + ffmpeg
  test-work-macos:
    name: Work machine (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run install
        run: bash ./install.sh

      - name: Assert base tools installed
        run: |
          export PATH="${HOME}/.local/bin:${PATH}"
          eval "$(~/.local/bin/mise activate bash)"
          for tool in bat delta fzf glow jq just lazydocker lazygit nvim; do
            if ! command -v "$tool" &>/dev/null; then
              echo "FAIL: $tool not found"
              exit 1
            fi
            echo "OK: $tool"
          done

      - name: Assert ffmpeg installed
        run: |
          export PATH="${HOME}/.local/bin:${PATH}"
          eval "$(~/.local/bin/mise activate bash)"
          if ! command -v ffmpeg &>/dev/null; then
            echo "FAIL: ffmpeg should be installed on work machine"
            exit 1
          fi
          echo "OK: ffmpeg $(ffmpeg -version 2>&1 | head -1)"
